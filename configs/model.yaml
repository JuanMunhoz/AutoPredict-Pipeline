# Model hyperparameters. Swappable without touching code.
# `estimator` selects the concrete model built by the training factory.

estimator: lightgbm        # lightgbm | xgboost | logistic_regression

lightgbm:
  n_estimators: 400
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.2
  min_child_samples: 30
  objective: binary
  n_jobs: -1

xgboost:
  n_estimators: 400
  learning_rate: 0.03
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.2
  objective: "binary:logistic"
  eval_metric: auc
  n_jobs: -1

logistic_regression:
  C: 1.0
  max_iter: 1000
  class_weight: balanced
