# Local full-stack for development: API + MLflow tracking + MinIO (S3 remote).
# `docker compose -f docker/docker-compose.yml up -d --build`
name: autopredict

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: autopredict-api:local
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_LOG_JSON: "true"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ../models:/app/models:ro
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://autopredict/mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/autopredict;
      exit 0;
      "

volumes:
  mlflow-data:
  minio-data:
