name: CD

# Build & publish the API image and deploy to Fly.io, but only after CI passes
# on main. The image bundles the current Production model artifacts, which are
# pulled from the DVC remote (Supabase S3) prior to the build.

on:
  # NOTE: auto-deploy on push is disabled until deploy secrets exist
  # (FLY_API_TOKEN, S3_*). Without them the deploy step fails on every push.
  # Re-enable the push trigger below once secrets are configured in the repo.
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - "docs/**"
  #     - "**/*.md"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & push image to GHCR
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Pull model artifacts from DVC remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          uv tool install "dvc[s3]"
          dvc pull models --force || echo "No DVC-tracked models yet; building with checked-in artifacts."

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/autopredict-api
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Fly.io (rolling, zero-downtime)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only \
            --image ghcr.io/${{ github.repository_owner }}/autopredict-api:sha-${{ github.sha }} \
            --strategy rolling
